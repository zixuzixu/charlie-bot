<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — {{ session.name }} — CharlieBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { slate: { 850: '#172033' } } } }
    };
  </script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    /* JSON syntax highlighting */
    .json-key    { color: #7dd3fc; }  /* sky-300 */
    .json-str    { color: #86efac; }  /* green-300 */
    .json-num    { color: #fda4af; }  /* rose-300 */
    .json-bool   { color: #fdba74; }  /* orange-300 */
    .json-null   { color: #94a3b8; }  /* slate-400 */

    /* Event type badge colours */
    .badge-user      { background: #1d4ed8; color: #bfdbfe; }
    .badge-assistant { background: #166534; color: #bbf7d0; }
    .badge-master_done { background: #14532d; color: #86efac; }
    .badge-result    { background: #713f12; color: #fde68a; }
    .badge-task_delegated { background: #581c87; color: #e9d5ff; }
    .badge-worker_summary { background: #4c1d95; color: #ddd6fe; }
    .badge-assistant_error { background: #7f1d1d; color: #fca5a5; }
    .badge-ping      { background: #1e293b; color: #64748b; }
    .badge-default   { background: #1e293b; color: #94a3b8; }

    .event-row { border-bottom: 1px solid #1e293b; }
    .event-row:last-child { border-bottom: none; }
    .event-row:hover { background: #0f172a; }

    pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body class="dark bg-slate-900 text-slate-100 min-h-screen">

  <!-- Top bar -->
  <header class="sticky top-0 z-10 bg-slate-850 border-b border-slate-700 flex items-center gap-3 px-4 py-3">
    <a href="/?session={{ session_id }}"
       class="flex items-center gap-1.5 text-slate-400 hover:text-slate-200 transition-colors text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
    <div class="h-4 w-px bg-slate-700"></div>
    <h1 class="text-sm font-semibold text-slate-200 truncate flex-1">
      <span class="text-slate-500 mr-1">Events:</span>{{ session.name }}
    </h1>
    <a href="{{ events_url }}" download
       class="flex items-center gap-1.5 text-xs text-slate-500 hover:text-slate-300 transition-colors px-2 py-1 rounded border border-slate-700 hover:border-slate-600">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
      Download JSONL
    </a>
    <span id="event-count" class="text-xs text-slate-500"></span>
  </header>

  <!-- Filter bar -->
  <div class="border-b border-slate-800 px-4 py-2 flex items-center gap-3 bg-slate-900/80 sticky top-14 z-10">
    <label class="text-xs text-slate-500">Filter by type:</label>
    <input id="type-filter"
           type="text"
           placeholder="e.g. user, assistant, result …"
           class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs focus:outline-none focus:border-blue-500 text-slate-300 placeholder-slate-600 w-48">
    <label class="flex items-center gap-1.5 text-xs text-slate-400 cursor-pointer select-none">
      <input id="expand-all" type="checkbox" class="accent-blue-500">
      Expand all
    </label>
    <button onclick="clearFilter()"
            class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Clear</button>
  </div>

  <!-- Event list -->
  <div id="event-list" class="divide-y divide-slate-800/60">
    <!-- populated by JS -->
  </div>

  <!-- Loading / error states -->
  <div id="loading" class="flex items-center justify-center py-16 text-slate-500 text-sm gap-2">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    Loading events…
  </div>
  <div id="error-msg" class="hidden text-center py-16 text-red-400 text-sm"></div>
  <div id="empty-msg" class="hidden text-center py-16 text-slate-500 text-sm">No events found.</div>

  <script>
    // -------------------------------------------------------------------------
    // Constants
    // -------------------------------------------------------------------------
    const EVENTS_URL = {{ events_url|tojson }};

    // -------------------------------------------------------------------------
    // Syntax highlighting
    // -------------------------------------------------------------------------
    function syntaxHighlight(obj) {
      const json = JSON.stringify(obj, null, 2);
      return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
        (match) => {
          let cls = 'json-num';
          if (/^"/.test(match)) {
            cls = /:$/.test(match) ? 'json-key' : 'json-str';
          } else if (/true|false/.test(match)) {
            cls = 'json-bool';
          } else if (/null/.test(match)) {
            cls = 'json-null';
          }
          return `<span class="${cls}">${escapeHtml(match)}</span>`;
        }
      );
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // -------------------------------------------------------------------------
    // Badge colour for event type
    // -------------------------------------------------------------------------
    function badgeStyle(type) {
      const known = [
        'user', 'assistant', 'master_done', 'result',
        'task_delegated', 'worker_summary', 'assistant_error', 'ping',
      ];
      const cls = known.includes(type) ? `badge-${type}` : 'badge-default';
      return cls;
    }

    // -------------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------------
    let allEvents = [];
    let expandAll = false;

    // -------------------------------------------------------------------------
    // Render
    // -------------------------------------------------------------------------
    function renderEvents(events) {
      const list = document.getElementById('event-list');
      list.innerHTML = '';

      if (!events.length) {
        document.getElementById('empty-msg').classList.remove('hidden');
        return;
      }
      document.getElementById('empty-msg').classList.add('hidden');

      events.forEach((ev, idx) => {
        const row = document.createElement('div');
        row.className = 'event-row px-4 py-2.5 cursor-pointer';
        row.dataset.idx = idx;

        const type = ev.type || 'unknown';
        const badgeCls = badgeStyle(type);
        const ts = ev.ts ? new Date(ev.ts * 1000).toLocaleTimeString() : '';

        // Summary line: pick a useful one-liner
        let summary = '';
        if (ev.content && typeof ev.content === 'string') {
          summary = ev.content.substring(0, 120);
        } else if (ev.description) {
          summary = ev.description.substring(0, 120);
        } else if (ev.message && ev.message.content) {
          const blocks = Array.isArray(ev.message.content) ? ev.message.content : [];
          const textBlock = blocks.find(b => b.type === 'text');
          if (textBlock) summary = (textBlock.text || '').substring(0, 120);
        }

        row.innerHTML = `
          <div class="flex items-center gap-2 min-w-0">
            <span class="text-xs font-mono text-slate-600 w-8 flex-shrink-0 text-right">${idx + 1}</span>
            <span class="text-xs px-1.5 py-0.5 rounded font-mono flex-shrink-0 ${badgeCls}">${escapeHtml(type)}</span>
            ${ts ? `<span class="text-xs text-slate-600 flex-shrink-0 font-mono">${ts}</span>` : ''}
            ${summary ? `<span class="text-xs text-slate-400 truncate">${escapeHtml(summary)}</span>` : ''}
          </div>
          <div class="json-body ${expandAll ? '' : 'hidden'} mt-2 ml-10">
            <pre class="text-xs bg-slate-800 rounded p-3 overflow-x-auto leading-5">${syntaxHighlight(ev)}</pre>
          </div>`;

        row.addEventListener('click', () => {
          const body = row.querySelector('.json-body');
          body.classList.toggle('hidden');
        });

        list.appendChild(row);
      });
    }

    function filterEvents() {
      const q = document.getElementById('type-filter').value.trim().toLowerCase();
      const filtered = q
        ? allEvents.filter(ev => (ev.type || '').toLowerCase().includes(q))
        : allEvents;
      renderEvents(filtered);
      applyExpandAll();
    }

    function applyExpandAll() {
      document.querySelectorAll('.json-body').forEach(el => {
        if (expandAll) {
          el.classList.remove('hidden');
        } else {
          el.classList.add('hidden');
        }
      });
    }

    function clearFilter() {
      document.getElementById('type-filter').value = '';
      filterEvents();
    }

    // -------------------------------------------------------------------------
    // Fetch JSONL
    // -------------------------------------------------------------------------
    async function loadEvents() {
      try {
        const res = await fetch(EVENTS_URL);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        const text = await res.text();
        const lines = text.split('\n').filter(l => l.trim());
        allEvents = lines.map((line, i) => {
          try {
            return JSON.parse(line);
          } catch (err) {
            return { type: 'parse_error', raw: line, error: err.message, _line: i + 1 };
          }
        });

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('event-count').textContent = `${allEvents.length} events`;
        filterEvents();
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        const errEl = document.getElementById('error-msg');
        errEl.textContent = 'Failed to load events: ' + err.message;
        errEl.classList.remove('hidden');
      }
    }

    // -------------------------------------------------------------------------
    // Wire up controls
    // -------------------------------------------------------------------------
    document.getElementById('type-filter').addEventListener('input', filterEvents);

    document.getElementById('expand-all').addEventListener('change', (e) => {
      expandAll = e.target.checked;
      applyExpandAll();
    });

    // -------------------------------------------------------------------------
    // Boot
    // -------------------------------------------------------------------------
    loadEvents();
  </script>
</body>
</html>
