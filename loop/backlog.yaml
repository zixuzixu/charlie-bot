- id: '003'
  title: Split run_message into smaller functions
  description: 'agents/master_cc.py:run_message is 180 lines — by far the longest
    function. Extract logical phases: _build_prompt() for voice prefix, _handle_event()
    for the event loop body (compact_boundary detection), _finalize_session() for
    the finally block (thinking state, error broadcast, tex check). Each becomes a
    testable unit.

    '
