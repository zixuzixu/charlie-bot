- id: '006'
  title: Cache scheduler session lookup per tick
  description: 'core/scheduler.py _tick() calls _get_or_create_session and _get_last_run
    per enabled task, each doing a full list_sessions() directory scan. With N tasks,
    that''s 2N scans per 60s tick. Cache the session list once at the start of _tick()
    and pass it to _maybe_run/_get_last_run. Reduces I/O from O(N) to O(1) per tick.

    '
  category: performance
  status: pending
  created: '2026-02-28T12:00:00Z'
  priority: medium
- id: '007'
  title: Log silently swallowed exception in _fetch
  description: 'api/sessions.py:99 (_fetch in all_sessions_usage) catches except Exception
    and returns (sid, None) without logging. Per project rules, caught exceptions
    must always be logged. Add log.debug or log.warning to the catch block.

    '
  category: error-handling
  status: pending
  created: '2026-02-28T12:00:00Z'
  priority: high
- id: 008
  title: Make _update_usage_cache async
  description: 'core/sessions.py:422 _update_usage_cache() does synchronous read_text/write_text
    file I/O but is called from async save_chat_event() on every persisted event.
    On slow disks this blocks the event loop. Either wrap the file ops in asyncio.to_thread()
    or keep the cache dict in-memory and flush periodically.

    '
  category: performance
  status: pending
  created: '2026-02-28T12:00:00Z'
  priority: medium
- id: 009
  title: Remove redundant field_validators in config.py
  description: 'core/config.py has both a model_validator (migrate_and_expand, L98-101)
    and separate field_validators (expand_workspace_dirs L120, expand_worktree_dir
    L125) that both call os.path.expanduser on workspace_dirs and worktree_dir. The
    model_validator runs first and already handles expansion. Delete the two field_validators
    (6 lines) to avoid double-expansion.

    '
  category: maintainability
  status: pending
  created: '2026-02-28T12:00:00Z'
  priority: low
