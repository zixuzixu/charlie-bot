- id: '006'
  title: Cache scheduler session lookup per tick
  description: 'core/scheduler.py _tick() calls _get_or_create_session and _get_last_run
    per enabled task, each doing a full list_sessions() directory scan. With N tasks,
    that''s 2N scans per 60s tick. Cache the session list once at the start of _tick()
    and pass it to _maybe_run/_get_last_run. Reduces I/O from O(N) to O(1) per tick.

    '
  category: performance
  status: approved
