- id: '001'
  title: Extract shared session-view loader
  description: 'api/pages.py:index (L76-95) and api/sessions.py:get_session_view (L115-142)
    duplicate the same load-events → load-threads → events_to_messages → usage_from_events
    → mark_read pipeline. Extract a shared helper (e.g. build_session_view_data())
    in api/message_utils.py or a new api/helpers.py that both endpoints call. Reduces
    ~30 duplicate lines to ~2 call sites.

    '
  category: duplication
  status: pending
  created: '2026-02-27T12:00:00Z'
  priority: medium
- id: '002'
  title: Collapse 6 session-toggle methods into generic helper
  description: 'core/sessions.py has archive/unarchive/star/unstar/mark_waiting/unmark_waiting
    (L227-292) all following identical get→mutate→save→log pattern. Introduce _update_field(session_id,
    field, value, log_event) and reduce each to a one-liner. Saves ~50 lines, lowers
    maintenance surface.

    '
  category: duplication
